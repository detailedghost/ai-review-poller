---
name: release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-attach:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        env:
          REVIEW_LOOP_POLLER_BIN: ${{ github.workspace }}/dist/ai-review-poller-linux-x64
          REVIEW_LOOP_POLLER_SRC: ${{ github.workspace }}
        run: |
          mkdir -p dist
          ./build.sh
          sha256sum dist/ai-review-poller-linux-x64 > dist/ai-review-poller-linux-x64.sha256

      - name: Upload binary to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            dist/ai-review-poller-linux-x64 \
            dist/ai-review-poller-linux-x64.sha256 \
            --clobber
