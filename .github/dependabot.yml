---
version: 2

updates:
  # npm / bun — package.json and bun.lockb
  - package-ecosystem: npm
    directory: /
    target-branch: master
    schedule:
      interval: weekly
      day: monday
      time: 09:00
    open-pull-requests-limit: 5
    reviewers:
      - detailedghost
    commit-message:
      prefix: chore(deps)
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      # Major bumps get their own PR per package so review is deliberate.
      # Dependabot raises ungrouped PRs for semver-major by default.

  # GitHub Actions workflow pins
  - package-ecosystem: github-actions
    directory: /
    target-branch: master
    schedule:
      interval: weekly
      day: monday
      time: 09:00
    open-pull-requests-limit: 5
    reviewers:
      - detailedghost
    commit-message:
      prefix: chore(deps)
    groups:
      github-actions:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
